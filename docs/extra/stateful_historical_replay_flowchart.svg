<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120">
  <defs>
    <style>
      .bg { fill: #f7f9fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #152536; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #506273; }
      .section-title { font: 700 20px Arial, sans-serif; fill: #152536; }
      .box-title { font: 700 16px Arial, sans-serif; fill: #152536; }
      .text { font: 400 14px Arial, sans-serif; fill: #2d3b45; }
      .small { font: 400 12px Arial, sans-serif; fill: #536675; }
      .formula { font: 700 14px "Courier New", monospace; fill: #19364f; }
      .panel { fill: #ffffff; stroke: #9fb1bf; stroke-width: 2; rx: 12; }
      .panel-blue { fill: #eef6ff; stroke: #7aa7cc; stroke-width: 2; rx: 12; }
      .panel-green { fill: #ecf7f2; stroke: #75ad98; stroke-width: 2; rx: 12; }
      .panel-gold { fill: #fff8e8; stroke: #d1aa4c; stroke-width: 2; rx: 12; }
      .panel-red { fill: #fff0ee; stroke: #cc8279; stroke-width: 2; rx: 12; }
      .panel-purple { fill: #f5f0ff; stroke: #9b83c9; stroke-width: 2; rx: 12; }
      .box { fill: #ffffff; stroke: #bac8d3; stroke-width: 1.5; rx: 8; }
      .gate { fill: #ffffff; stroke: #60798c; stroke-width: 2; }
      .arrow { stroke: #36556b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #7b8fa0; stroke-width: 2; fill: none; marker-end: url(#arrow-soft); stroke-dasharray: 7 6; }
      .feedback { stroke: #1f7a68; stroke-width: 3; fill: none; marker-end: url(#arrow-feedback); }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#36556b"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#7b8fa0"/>
    </marker>
    <marker id="arrow-feedback" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#1f7a68"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1120"/>

  <text class="title" x="56" y="58">Stateful Historical Replay Flow</text>
  <text class="subtitle" x="58" y="88">Historical price, temperature, and gas are replayed through a dispatch model that remembers yesterday's plant condition.</text>

  <!-- Left column: inputs -->
  <rect class="panel-blue" x="42" y="126" width="300" height="360"/>
  <text class="section-title" x="64" y="162">Historical Inputs X_d</text>

  <rect class="box" x="64" y="184" width="256" height="72"/>
  <text class="box-title" x="80" y="208">Hourly Power Price</text>
  <text class="text" x="80" y="229">node / zone / hub, DA or RT</text>
  <text class="small" x="80" y="248">USD/MWh, timestamp aligned</text>

  <rect class="box" x="64" y="270" width="256" height="72"/>
  <text class="box-title" x="80" y="294">Hourly Temperature</text>
  <text class="text" x="80" y="315">plant met, station, or ERA5</text>
  <text class="small" x="80" y="334">deg F or deg C, unit checked</text>

  <rect class="box" x="64" y="356" width="256" height="86"/>
  <text class="box-title" x="80" y="380">Daily Delivered Gas</text>
  <text class="text" x="80" y="401">benchmark + basis + delivery</text>
  <text class="small" x="80" y="420">USD/MMBtu, mapped to hours</text>

  <rect class="panel-gold" x="42" y="520" width="300" height="392"/>
  <text class="section-title" x="64" y="556">Static Plant Config C</text>

  <rect class="box" x="64" y="578" width="256" height="72"/>
  <text class="box-title" x="80" y="602">Operating Modes</text>
  <text class="text" x="80" y="623">off, 1x1, 2x1, duct firing</text>
  <text class="small" x="80" y="642">simplify to one mode if needed</text>

  <rect class="box" x="64" y="664" width="256" height="72"/>
  <text class="box-title" x="80" y="688">Pmin / Pmax Curves</text>
  <text class="formula" x="80" y="709">Pmax_eff(m,t,S_d)</text>
  <text class="small" x="80" y="728">mode, temp, degradation, outage</text>

  <rect class="box" x="64" y="750" width="256" height="94"/>
  <text class="box-title" x="80" y="774">Fuel-Burn Curve</text>
  <text class="formula" x="80" y="795">FuelBurn_m(P,T,S_d)</text>
  <text class="small" x="80" y="814">AvgHR = FuelBurn / P</text>
  <text class="small" x="80" y="832">IncHR = dFuelBurn / dP</text>

  <rect class="box" x="64" y="858" width="256" height="52"/>
  <text class="text" x="80" y="878">VOM, start costs, min up/down</text>
  <text class="small" x="80" y="898">LTSA/CSA terms and triggers</text>

  <!-- Center top: state -->
  <rect class="panel-green" x="410" y="126" width="360" height="250"/>
  <text class="section-title" x="432" y="162">Opening Plant State S_d</text>
  <text class="subtitle" x="432" y="187">The model's memory at start of day.</text>

  <rect class="box" x="432" y="210" width="316" height="50"/>
  <text class="box-title" x="448" y="232">Availability State</text>
  <text class="small" x="448" y="250">available, planned outage, forced outage, derate</text>

  <rect class="box" x="432" y="274" width="316" height="50"/>
  <text class="box-title" x="448" y="296">Operating Memory</text>
  <text class="small" x="448" y="314">current mode, hours since shutdown, start type</text>

  <rect class="box" x="432" y="338" width="316" height="50"/>
  <text class="box-title" x="448" y="360">Condition Memory</text>
  <text class="small" x="448" y="378">EOH, headroom, fouling, LTSA counters</text>

  <!-- Center: engine -->
  <rect class="panel" x="410" y="430" width="760" height="482"/>
  <text class="section-title" x="432" y="466">Daily Replay Engine</text>

  <!-- Gate diamond -->
  <polygon class="gate" points="560,508 640,558 560,608 480,558"/>
  <text class="box-title" x="518" y="553">Availability</text>
  <text class="box-title" x="542" y="572">Gate</text>

  <rect class="box" x="720" y="506" width="188" height="74"/>
  <text class="box-title" x="738" y="530">Feasible Set</text>
  <text class="small" x="738" y="550">mode m and MW P</text>
  <text class="small" x="738" y="568">Pmin_eff &lt;= P &lt;= Pmax_eff</text>

  <rect class="box" x="956" y="506" width="188" height="74"/>
  <text class="box-title" x="974" y="530">Hourly Economics</text>
  <text class="small" x="974" y="550">revenue = price * MW</text>
  <text class="small" x="974" y="568">fuel = gas * FuelBurn</text>

  <rect class="box" x="720" y="642" width="188" height="74"/>
  <text class="box-title" x="738" y="666">Dispatch Optimizer</text>
  <text class="small" x="738" y="686">recover start cost</text>
  <text class="small" x="738" y="704">enforce constraints</text>

  <rect class="box" x="956" y="642" width="188" height="74"/>
  <text class="box-title" x="974" y="666">Hourly Profile</text>
  <text class="small" x="974" y="686">online, mode, MW, MWh</text>
  <text class="small" x="974" y="704">fuel, starts, margin</text>

  <rect class="box" x="720" y="780" width="424" height="84"/>
  <text class="box-title" x="738" y="804">Daily State Update</text>
  <text class="small" x="738" y="824">EOH, starts, fouling, outage state, LTSA counters</text>
  <text class="formula" x="738" y="846">S_{d+1} = StateUpdate(S_d, Y_d, X_d, C)</text>

  <!-- Outputs -->
  <rect class="panel-purple" x="1238" y="126" width="320" height="520"/>
  <text class="section-title" x="1260" y="162">Replay Outputs</text>

  <rect class="box" x="1260" y="184" width="276" height="78"/>
  <text class="box-title" x="1276" y="208">Hourly Dispatch Table</text>
  <text class="small" x="1276" y="228">price, temp, gas, mode, MW</text>
  <text class="small" x="1276" y="246">fuel, revenue, margin, starts</text>

  <rect class="box" x="1260" y="286" width="276" height="78"/>
  <text class="box-title" x="1276" y="310">Daily State Table</text>
  <text class="small" x="1276" y="330">opening S_d, closing S_d+1</text>
  <text class="small" x="1276" y="348">EOH, headroom, fouling, outage</text>

  <rect class="box" x="1260" y="388" width="276" height="78"/>
  <text class="box-title" x="1276" y="412">Monthly Summary</text>
  <text class="small" x="1276" y="432">MWh, fuel cost, LTSA cost</text>
  <text class="small" x="1276" y="450">gross margin, spark capture</text>

  <rect class="box" x="1260" y="490" width="276" height="78"/>
  <text class="box-title" x="1276" y="514">Validation Checks</text>
  <text class="small" x="1276" y="534">actual gen, fuel, outages</text>
  <text class="small" x="1276" y="552">contract invoices and events</text>

  <!-- Source and provenance legend -->
  <rect class="panel-red" x="1238" y="704" width="320" height="208"/>
  <text class="section-title" x="1260" y="740">Source &amp; Provenance</text>
  <text class="text" x="1260" y="772">Direct labels/data:</text>
  <text class="small" x="1395" y="772">price, temp, gas index</text>
  <text class="text" x="1260" y="804">Calculated fields:</text>
  <text class="small" x="1395" y="804">spark, EOH, starts, HR</text>
  <text class="text" x="1260" y="836">Contract sources:</text>
  <text class="small" x="1395" y="836">LTSA/CSA, invoices</text>
  <text class="text" x="1260" y="868">Assumptions:</text>
  <text class="small" x="1395" y="868">curves, VOM, confidence</text>

  <!-- Arrows -->
  <path class="arrow" d="M 342 300 C 382 300, 382 548, 475 548"/>
  <path class="arrow" d="M 342 716 C 380 716, 384 660, 700 660"/>
  <path class="arrow" d="M 590 376 L 590 500"/>
  <path class="arrow" d="M 640 558 L 710 548"/>
  <path class="arrow" d="M 908 542 L 946 542"/>
  <path class="arrow" d="M 1050 580 C 1050 612, 820 610, 820 636"/>
  <path class="arrow" d="M 908 680 L 946 680"/>
  <path class="arrow" d="M 1050 716 C 1050 758, 940 760, 940 776"/>
  <path class="arrow" d="M 640 558 C 670 620, 650 804, 710 816"/>
  <path class="arrow" d="M 1144 684 C 1190 684, 1190 230, 1250 230"/>
  <path class="arrow" d="M 1144 822 C 1190 822, 1190 326, 1250 326"/>
  <path class="arrow-soft" d="M 1398 568 L 1398 486"/>
  <path class="arrow-soft" d="M 1398 466 L 1398 384"/>
  <path class="feedback" d="M 916 864 C 916 1012, 240 1012, 240 942 C 240 404, 410 362, 432 362"/>

  <!-- Feedback label -->
  <rect x="404" y="956" width="460" height="46" fill="#f7f9fb" stroke="#1f7a68" stroke-width="1.5" rx="8"/>
  <text class="box-title" x="424" y="984">Feedback loop: closing state S_d+1 becomes tomorrow's opening state S_d</text>

  <!-- Footer -->
  <text class="small" x="56" y="1072">Recommended first implementation: Level B stateful single-mode replay with piecewise heat-rate curve and simple daily state update.</text>
  <text class="small" x="56" y="1092">Do not treat heat rate as one scalar except for a Level A sanity screen; use FuelBurn_m(P,T,S_d) or a piecewise heat-rate curve.</text>
</svg>
