gas_market:
  delivery_hub:
    value: "Algonquin Citygate"
    status: real_reported
    source: "Lab-curated assignment for Northeast US delivery point; NYISO Zone A relevant"
    caveat: "Used as the delivered-gas reference for Lockport dispatch economics. Algonquin Citygate basis is captured in data/paths/lockport/gas_price_history.parquet alongside Henry Hub."
  forward_reference_hub:
    value: "Henry Hub"
    status: real_reported
    source: "Per Step 1 plan §'Gas Price Path Construction' — Henry Hub is the forward-anchor reference, Algonquin Citygate provides the basis overlay"
  delivered_gas_formula:
    value: "delivered_gas_t = Henry_Hub_forward + Algonquin_basis + historical_daily_shape"
    status: real_reported
    source: "Step 1 plan §'Gas Price Path Construction'"

  v1_modeling_choice:
    hub_used_for_delivered_gas:
      value: "Henry Hub"
      status: assumed_industry
      source: "ADR-001 (Frame A v1 plumbing validation decision)"
      confidence: LOW
      caveat: "v1 uses Henry Hub daily prices directly as delivered gas. The asset's actual delivery point is Algonquin Citygate (see delivery_hub above), but our gas_price_history.parquet has only 2014-2017 Algonquin data. Applying that forward would overstate post-2017 basis (Atlantic Sunrise + other Northeast pipeline capacity expansions). Consequence: dual-fuel switching never fires in v1; winter dispatch risk under-represented. See docs/decisions/001-gas-hub-treatment-v1.md."
      validation_path: "v2 follow-on ADR will document proper Algonquin basis modeling (likely daily distribution + temperature conditioning + external sources for post-2017 period). When that lands, this field's value resets to 'Algonquin Citygate'."
    dual_fuel_switching_fires_in_v1:
      value: false
      status: assumed_industry
      source: "Direct consequence of v1_modeling_choice.hub_used_for_delivered_gas = Henry Hub"
      confidence: HIGH
      caveat: "Henry Hub never crosses the oil-switching economic threshold (~$14-22/MMBtu delivered gas). Dual-fuel logic in src/dispatch/ is present but unfired in v1. See ADR-001 'Consequences' and caveats.md §4."
      validation_path: "Becomes true when v2 basis modeling lands per ADR-001"

