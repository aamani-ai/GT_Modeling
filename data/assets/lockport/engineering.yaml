    value: "3-on-1 CCGT cogeneration, dual-fuel"
    status: real_computed
    source: "From generator inventory + EIA-860 schedule 3_5 dual-fuel flags"
  combined_cycle_unit_code:
    value: "LEA1"
    status: real_reported
    source: "EIA-860 schedule 6_2 Y2024 — shared by all 4 generators"
  hrsg_count:
    value: 3
    status: real_reported
    source: "EIA-860 schedule 6_2 + equipment profile §2 topology — one HRSG per CT"
  is_ambient_sensitive:
    value: true
    status: real_computed
    source: "All four generators have sum(|summer_derate|, |winter_boost|) > 5% — see caveats.md §7"
  is_chp:
    value: true
    status: real_reported
    source: "EIA-860 schedule 3_1 — Associated with CHP System = Yes for all four generators"
    caveat: "Cogen plant. Tech-class merchant-CCGT defaults under-state VOM by 30-50% — see caveats.md §2."
