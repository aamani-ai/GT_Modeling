    value: 221.3
    status: real_computed
    source: "Sum of generators[*].nameplate_capacity_mw (3 × 48.7 + 75.2)"
  total_net_summer_mw:
    value: 219.0
    status: real_computed
    source: "Sum of generators[*].net_summer_capacity_mw (3 × 47.0 + 78.0)"
  total_net_winter_mw:
    value: 230.0
    status: real_computed
    source: "Sum of generators[*].net_winter_capacity_mw (3 × 50.0 + 80.0)"
