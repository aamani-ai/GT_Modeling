      source: "EIA-860 schedule 3_1 Y2024 — Duct Burners = Yes (only GEN4)"
      caveat: "Supplemental firing inside the HRSG. Adds steam-side flexibility — confirmed in MOR data: 460 of 1,826 days (25.2%) operate with 0 MWh + non-zero gas + non-zero DHTS. See operating_profile.yaml.steam_only_mode for the empirical parameters."
