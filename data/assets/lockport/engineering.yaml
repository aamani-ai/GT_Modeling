    value: false
    status: real_reported
    source: "EIA-860 schedule 3_1 — Planned Repower fields all null"
  has_carbon_capture:
    value: false
    status: real_reported
    source: "EIA-860 schedule 3_1 — Carbon Capture Technology = No for all generators"

