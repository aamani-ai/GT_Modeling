      value: 14.0
      status: real_reported
      source: "EIA-860 schedule 3_1 Y2024 — Minimum Load (MW)"
      caveat: "19% of nameplate — unusually low, reflecting steam-side throttling capability. The ST can run while CTs are partially shut down, enabling multi-mode dispatch (see caveats.md §3)."
