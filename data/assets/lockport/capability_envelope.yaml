# Lockport Energy Associates LP — Capability Envelope
#
# What duties this plant is *capable of providing*, given its current hardware,
# contracts, certifications, infrastructure, and crew at this point in time.
# A feasibility set — typically multi-element.
#
# This is the *capability-side* concept from the regime decomposition: what the
# plant *can be*. The realization side (what the plant *is currently doing*)
# lives separately and is inferred from operating history.
#
# Per docs/discussion/01_regime_concept.md §3 and ADR-003 (regime decomposition).
# Per docs/learning_logs/basics/10_plant_duty_classifications.md (duty vocabulary).
# Per docs/learning_logs/basics/11_capability_vs_realization.md (framework).
# Per docs/assumptions/status_taxonomy.md (every leaf carries {value, status, source}).
#
# Cadence: very slow (years). Major asset events trigger refresh:
#   - Major investment (new equipment, retrofit, expansion, decommissioning)
#   - Contract renewal or renegotiation
#   - Recertification (fast-start, AGC, RMR, environmental permits)
#   - Infrastructure changes (DHTS connection, fuel-supply, transmission)
#   - Crew or operations-philosophy shifts (24/7 staffing tier)

