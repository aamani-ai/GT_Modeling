# ============================================================================
# Per-duty blocks
# ============================================================================
# Each duty has:
#   - qualified: { value, status, source, [confidence], [caveat], [validation_path] }
#   - evidence:  { value (free-text), status, source, [caveat] }
#   - mechanism: (optional, only for must_run_eligible) — sub-blocks per mechanism
# ============================================================================

cogen:
  qualified:
    value: true
    status: real_reported
    source: "engineering.yaml plant.is_chp = true; EIA-860 schedule 3_1 'Associated with CHP System = Yes' for all 4 generators"
    confidence: HIGH
  evidence:
    value: "DHTS (Daily Heat Tape Schedule) infrastructure present per renewablesinfo equipment profile; HRSGs configured with steam-export capability; PURPA-era 1992 plant designed for cogeneration as primary purpose; Entity Type Q (cogeneration entity) per EIA-860; MOR data shows winter steam-driven dispatch patterns. STEAM HOST identified (2026-05-26 web audit): the original cogen host is the Harrison Radiator Division of General Motors (steam + electricity delivered to the GM Harrison Radiator plant in Lockport, NY); electricity also sold to NYSEG (New York State Electric & Gas) under a PURPA-era arrangement."
    status: real_reported
    source: "Composite: engineering.yaml + identity.yaml + diligence-extractor MOR notebook Stage 1; steam-host + offtaker identity from DOE FECM 1992 order (ord662) + public plant histories (gridinfo, FECM), web audit 2026-05-26"
    caveat: "Steam host = Harrison Radiator (GM) as of 1992 commissioning. GM later divested Harrison Radiator (→ Delphi Thermal → subsequent owners); the host *facility* at Lockport likely continues but the host *entity* name/owner may have changed. Current host contract status + counterparty identity awaits D2 (data-room) confirmation. The cogen *capability* (infrastructure + EIA CHP flag) is firm regardless."

mid_merit:
  qualified:
    value: true
    status: real_computed
    source: "Derived from engineering.yaml: 3×1 CCGT configuration, F-class, 1992 vintage; ramp adequate; HR mix (8,901-10,424 Btu/kWh across modes per operating_profile.yaml) is competitive in mid-merit dispatch"
    confidence: HIGH
  evidence:
    value: "Cycle-tolerant 3×1 CCGT supports daily on/off and intra-day ramping. Heat rate range from operating_profile.yaml is in mid-merit-economic range. MOR data shows historical mid-merit-realized behavior during summer months."
    status: real_computed
    source: "Composite: engineering.yaml + operating_profile.yaml"
    caveat: "Ramp rate ~20 MW/min is industry-typical for F-class CCGT vintage <2000 but is not directly verified for Lockport specifically. EIA-923 monthly fuel/output data or OEM spec sheet would confirm."

baseload:
  qualified:
    value: true
    status: real_computed
    source: "Derived from engineering.yaml: F-class CCGT, continuous-duty design; HR efficient enough for sustained operation; no structural barrier to high-CF operation"
    confidence: MEDIUM
  evidence:
    value: "Hardware supports continuous duty. Baseload capability is structurally present in the envelope even though current realization is well below baseload CF (~12-15% observed vs >70% baseload threshold)."
    status: real_computed
    source: "engineering.yaml + interpretation per learning_logs/basics/11 §4 (capability does not depend on current realization)"
    caveat: "Baseload-capable does not mean baseload-realized. Current Lockport CF (~12-15%) is far below baseload threshold (>70%). The capability is latent — could be exercised if market shifted favorably (e.g., if peer baseload retirements shifted the merit order). Worth noting because it represents unrealized optionality."

peaker:
  qualified:
    value: false
    status: real_reported
    source: "EIA-860 3_1 time_to_full_load_min = 720 (12 hr) for all 4 generators, via renewablesinfo_org thermal_enriched.parquet (queried 2026-05-26)"
    confidence: HIGH
  evidence:
    value: "Cold-start-to-full-load is 720 min (12 hr) per EIA — far slower than fast-response peaker duty (which needs minutes). Frame-class CCGT (CT prime movers + CA steam side), not aeroderivative. Even setting aside formal certification, the 12-hr start physically disqualifies fast peaker duty."
    status: real_reported
    source: "thermal_enriched.parquet: time_to_full_load_min=720, prime_mover_code=CT/CA, configuration_label='Combined Cycle' (EIA-860 3_1)"
    caveat: "The 720-min value is EIA's '12H' clustering default (86% of CCGTs report exactly 720 — see extracting_capability_from_thermal_archive.md §6 and pulling_specs_from_powerplantsinfo.md §5.4). It is therefore a coarse bucket, not a precise Lockport measurement — but it is still decisive: a fast peaker would report minutes, not hours. A formal NYISO fast-start-certification check (Tier 2) would confirm but is low-priority since the physical proxy already decides."

frequency_regulation:
  qualified:
    value: null
    status: placeholder
    source: "NYISO AGC qualification status unverified. Web audit 2026-05-26 finding: per-plant AGC/regulation participation is NOT publicly retrievable (NYISO does not publish a public AGC-qualified-resource list at plant grain). Does not yield to a D1 web check."
    validation_path: "Reclassified to D2 (data-room: any AS/regulation participation records) OR direct NYISO market-participant data / operator inquiry. The 62% CT min-load floor (capability_modifiers.load_turndown) also argues the CTs are not naturally suited to fine regulation; the CA is more flexible. NOT closeable by public web search."
  evidence:
    value: "Hardware *may* partly suffice (the CA ramps; CTs have a high 62% floor), but AGC qualification is a binary formal certification, not a hardware property — and it's not publicly disclosed per-plant. Genuinely unknown; needs D2 or operator inquiry."
    status: placeholder
    source: "Hardware reasoning per engineering.yaml + capability_modifiers.load_turndown; AGC gate unverified and not web-retrievable (audit 2026-05-26)"

must_run_eligible:
  qualified:
    value: true
    status: real_reported
    source: "Composite: at least one mechanism (steam_host_obligation) is structurally present and active per MOR data. See mechanism sub-blocks for the breakdown."
    confidence: MEDIUM
  evidence:
    value: "Multiple must-run mechanisms may apply to Lockport. Most-confidently active: steam-host obligation during DHTS-driven periods. Likely also: PURPA QF status (1992 PURPA-era + Entity Type Q + IPP CHP sector all consistent with QF). Not active: RMR (Lockport not on NYISO RMR list). Open: NYISO ICAP capacity-firm participation."
    status: real_reported
    source: "Composite of mechanism sub-blocks below"
    caveat: "must_run_eligible.qualified = true because at least one mechanism (steam-host obligation) is active. The full picture of which mechanisms apply and their interaction requires Phase 2 data-fill."
  mechanism:
    purpa_qf:
      qualified:
        value: true
        status: assumed_industry
        source: "Strong circumstantial: 1992 PURPA-era cogen + Entity Type Q + IPP CHP sector + (web audit 2026-05-26) confirmed PURPA-structure operation — electricity sold to NYSEG (utility must-purchase) and steam+power to GM Harrison Radiator host. This is the textbook PURPA QF cogen structure."
        confidence: HIGH
        validation_path: "Formal current QF status still unverified: FERC QF database / eLibrary Form 556 search for Lockport Energy Associates LP (the public web search did not surface the docket; FERC's QF search is a JS form — needs direct query or data-room regulatory filings)."
      evidence:
        value: "The QF *structure* is now confirmed by public sources (NYSEG electricity offtake + GM Harrison Radiator steam host + 1992 PURPA-era cogen). What remains unverified is the *formal current QF status* (active Form 556, current efficiency-threshold compliance per 18 CFR Part 292)."
        status: assumed_industry
        source: "Web audit 2026-05-26 (DOE FECM 1992 order + public plant histories) upgraded this from pure inference to confirmed-structure; formal docket confirmation still pending."
        confidence: HIGH
        caveat: "PURPA QF status can lapse if the plant fails the efficiency threshold (18 CFR Part 292). Strong evidence it WAS a QF; current formal status needs FERC eLibrary or data room."
    steam_host_obligation:
      qualified:
        value: true
        status: real_reported
        source: "MOR data (per diligence-extractor heat-rate notebook) shows DHTS deliveries on cold days, indicating active steam-host contract through 2024"
        confidence: MEDIUM
      evidence:
        value: "Active steam-host obligation drives must-run dispatch during DHTS-required hours. Host identified (2026-05-26 web audit): GM Harrison Radiator Division (Lockport, NY). In v1, modeled as coldest 20% of days proxy. Contract terms (hours, quantities, force majeure) pending data-room extraction."
        status: real_reported
        source: "diligence-extractor MOR notebook Stage 1 (steam-only days) + web audit 2026-05-26 (host identity)"
        caveat: "Host = GM Harrison Radiator as of 1992; GM divested Harrison Radiator, so current host entity may differ (facility likely continues). Contract continuity post-2024 + current counterparty pending D2."
    rmr:
      qualified:
        value: false
        status: real_computed
        source: "No public record ties Lockport to a NYISO Reliability-Must-Run designation. Web audit 2026-05-26 (NYISO RMR + Lockport) surfaced only the generic RMR framework, no Lockport-specific designation."
        confidence: MEDIUM
        validation_path: "Re-verify annually against NYISO RMR designations. Negative-evidence basis (absence from public RMR actions)."
      evidence:
        value: "RMR designations are public ISO actions; a Lockport RMR would surface in NYISO filings and news. None found. High-confidence not-active. (Lockport's must-run character comes from the steam-host obligation, not RMR.)"
        status: real_computed
        source: "Negative-evidence assertion; web audit 2026-05-26 found no Lockport RMR record"
    capacity_firm:
      qualified:
        value: null
        status: placeholder
        source: "NYISO ICAP capacity-market participation for Lockport not yet established. Web audit 2026-05-26 finding: NYISO ICAP clears at zone/aggregate level — per-plant participation is NOT publicly retrievable via web. This item does not yield to a D1 web check."
        validation_path: "Reclassified to D2 (data-room ICAP commitment letters / supplier-side settlement) OR direct NYISO market-participant data / operator inquiry. NOT closeable by public web search."
      evidence:
        value: "Per-plant ICAP participation isn't public. Also gap #2 in gaps_and_priorities.md (NYISO ICAP revenue, +$5-9M/yr if active). The capacity revenue question and the capacity-firm must-run question share this source — both need D2 or operator data."
        status: placeholder
        source: "Web audit 2026-05-26 confirmed not publicly retrievable; reclassified D1-web -> D2/operator"

# ============================================================================
# Capability modifiers — not duties, but attributes that condition duties
# ============================================================================
# These are physical capabilities (all Tier-1, from EIA) that shape which
# duties are realizable and how. They don't map 1:1 to a single duty.
# Added 2026-05-26 from thermal_enriched.parquet.

capability_modifiers:
  fuel_switching:
    qualified:
      value: true
      status: real_reported
      source: "EIA-860 3_5 Multifuel via thermal_enriched.parquet: is_dual_fuel=True, can_switch_when_operating=True (all 4 generators)"
      confidence: HIGH
    secondary_fuel:
      value: "DFO"
      status: real_reported
      source: "thermal_enriched secondary_energy_source = DFO (distillate fuel oil)"
    switch_time_hr:
      value: 1.0
      status: real_reported
      source: "thermal_enriched switch_time_gas_to_oil_hr = switch_time_oil_to_gas_hr = 1.0"
    can_switch_while_operating:
      value: true
      status: real_reported
      source: "thermal_enriched can_switch_when_operating = True"
    storage_limited:
      value: true
      status: real_reported
      source: "thermal_enriched fuel_switch_storage_limited = True — oil-tank runtime bounds sustained oil operation"
    air_permit_limited:
      value: true
      status: real_reported
      source: "thermal_enriched fuel_switch_air_permit_limited = True — Title V permit bounds oil-firing hours"
    capacity_mw_with_oil:
      value: "~43 per CT, 78 for CA (roughly fuel-symmetric with gas)"
      status: real_reported
      source: "thermal_enriched capacity_mw_with_gas vs capacity_mw_with_oil"
    conditions_duties:
      value: "Strengthens must_run_eligible and winter reliability: during natural-gas curtailment (polar vortex), Lockport can switch to oil in 1 hr and keep delivering steam (cogen must-run). Bounded by oil storage + air permit."
      status: real_computed
      source: "Interpretation per learning_logs/market_and_operations/05 §9 (must-run) + extracting_capability_from_thermal_archive.md §4"

  simple_cycle_capable:
    qualified:
      value: true
      status: real_reported
      source: "EIA-860 3_1 via thermal_enriched: can_bypass_hrsg = True for the 3 CTs (GEN1/2/3)"
      confidence: MEDIUM
    conditions_duties:
      value: "Expands the operating-mode envelope — the CTs can run GT-only (bypassing the HRSG), not just in combined-cycle. Relevant to operating-mode flexibility; in v1 the engine models 3xCC/2xCC/1xCC/steam-only/offline but not explicit simple-cycle GT operation."
      status: real_computed
      source: "Interpretation; can_bypass_hrsg from EIA-860 3_1"
    caveat: "can_bypass_hrsg is None for GEN4 (the CA/steam side), which is expected — bypass applies to the CTs."

  supplemental_firing:
    qualified:
      value: true
      status: real_reported
      source: "EIA-860 3_1 via thermal_enriched: has_duct_burners = True for GEN4 (the CA/steam side)"
      confidence: MEDIUM
    conditions_duties:
      value: "Duct-burner supplemental firing boosts steam output independent of GT load — cogen steam flexibility. May contribute to steam-only-mode capability (see operating_profile.yaml steam-only analysis + pulling_specs guide §Phase 2 steam-only framework)."
      status: real_computed
      source: "Interpretation; has_duct_burners from EIA-860 3_1"

  load_turndown:
    ct_min_load_pct:
      value: 0.62
      status: real_reported
      source: "EIA-860 3_1 via thermal_enriched: min_load_pct = 0.616 for CTs (min_load_mw 30 / nameplate 48.7)"
      caveat: "62% is a relatively high floor — limited CT turndown. Design/permit floor, not necessarily observed economic min."
    ca_min_load_pct:
      value: 0.19
      status: real_reported
      source: "thermal_enriched min_load_pct = 0.186 for GEN4 (CA): min_load 14 / nameplate 75.2"
    conditions_duties:
      value: "CT turndown is limited (62% floor); the CA is more flexible (19%). Conditions mid-merit cycling depth and is a key input to the load-level dimension (Stream B / 02_load_as_a_dimension.md), which the model does not yet represent (assumes 100% load when on)."
      status: real_computed
      source: "Interpretation; min_load_pct from EIA-860 3_1"

