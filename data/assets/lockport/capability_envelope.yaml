# ============================================================================
# Graduation criteria (notes for ADR-004, the future capability envelope ADR)
# ============================================================================
# This skeleton is the input to the graduation ADR.
# Decisions deferred to ADR-004:

graduation_deferrals:
  representation:
    value: "Skeleton uses per-duty richer-object representation. ADR-004 should formally commit this vs alternatives (categorical set; vector of (duty, qualified); richer object with multi-determinant breakdown for hardware/cert/contract/infra/crew)."
    status: real_reported
    source: "Per ADR-003 §5 open question #1"
  storage_location:
    value: "Skeleton lives in this file. ADR-004 should commit final location (this file vs extension of engineering.yaml vs combined with future identity.yaml archetype block)."
    status: real_reported
    source: "Per ADR-003 §5 open question #3"
  refresh_cadence:
    value: "Skeleton has no formal refresh cadence enforcement. ADR-004 should commit annual asset-profile refresh OR event-driven refresh (only on major asset events) OR hybrid."
    status: real_reported
    source: "Per ADR-003 §5 open question #2"
  multi_element_semantics:
    value: "Skeleton lists qualified duties simultaneously (e.g., cogen + mid_merit + baseload + must_run_eligible all true). ADR-004 should formally commit whether 'multi-element envelope' means vector of binary qualifications (current skeleton) or weighted/typed qualifications."
    status: real_reported
    source: "Per ADR-003 §5 open question #11"
  validity_window:
    value: "Each qualification may have its own validity window (e.g., RMR designation is time-bounded; PURPA QF can lapse on efficiency threshold). Skeleton does not yet track validity windows per-mechanism. ADR-004 should commit whether to add."
    status: real_reported
    source: "Identified during skeleton drafting; not in ADR-003"
