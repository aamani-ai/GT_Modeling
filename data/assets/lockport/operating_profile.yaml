# Lockport Energy Associates LP — Operating Profile
# Heat rate by mode, cold-start gas, mode distribution, annual generation patterns.
# Derived from 5 years (2021-2025) of daily Monthly Operating Reports analyzed in
# the diligence-extractor MOR notebook.
#
# Source: ~/code/personal/diligence-extractor/notebooks/daily_heat_rate_analysis.ipynb
# Stage 2 final-summary table + Stage 1 findings.
#
# Per consolidation plan §6 + docs/assumptions/status_taxonomy.md.

# ============================================================================
# Heat rate by operating mode (volume-weighted) — THE HEADLINE DELIVERABLE
# ============================================================================
# A 3-on-1 CCGT cogen has multiple distinct operating modes with materially
# different heat rates. A single "plant heat rate" misses 15-20% variation.
# The lookup is block-level; this is mode-specific.

heat_rate_by_mode:
  3xCC_full:
    btu_per_kwh:
      value: 8901
      status: real_observed
      source: "MOR notebook Stage 2: volume-weighted heat rate across 189 active days, 2021-2025"
      caveat: "Volume-weighted: sum(gas_mmbtu) × 1000 / sum(net_mwh). Operating-days filter applied (net_output > 0). Outliers (HR outside 5000-30000 Btu/kWh, 16% of CC days) excluded per Stage 2 §2.1 outlier policy."
    median_daily_btu_per_kwh:
      value: 8989
      status: real_observed
      source: "MOR notebook Stage 2: median of daily ratios across same 189 days"
    operating_days:
      value: 189
      status: real_observed
      source: "MOR notebook Stage 2: count of clean CC days in 3×CC_full mode after outlier filter"
    share_of_active_cc_days_pct:
      value: 64.9
      status: real_observed
      source: "MOR notebook Stage 2: 189 / 291 clean CC days"

  2xCC:
    btu_per_kwh:
      value: 9598
      status: real_observed
      source: "MOR notebook Stage 2: volume-weighted across 76 active days"
    median_daily_btu_per_kwh:
      value: 9611
      status: real_observed
      source: "MOR notebook Stage 2: median of daily ratios"
    operating_days:
      value: 76
      status: real_observed
      source: "MOR notebook Stage 2"
    share_of_active_cc_days_pct:
      value: 26.1
      status: real_observed
      source: "MOR notebook Stage 2: 76 / 291 clean CC days"

  1xCC:
    btu_per_kwh:
      value: 10424
      status: real_observed
      source: "MOR notebook Stage 2: volume-weighted across 26 active days"
      caveat: "Small sample (n=26). Year-by-year values are noisy (2022: 12,199; 2023: 7,370). Pool across years for headline."
    median_daily_btu_per_kwh:
      value: 10290
      status: real_observed
      source: "MOR notebook Stage 2: median of daily ratios"
    operating_days:
      value: 26
      status: real_observed
      source: "MOR notebook Stage 2"
    share_of_active_cc_days_pct:
      value: 8.9
      status: real_observed
      source: "MOR notebook Stage 2: 26 / 291 clean CC days"

  simple_cycle_observed:
    btu_per_kwh:
      value: null
      status: not_applicable
      source: "MOR notebook Stage 1: only 7 simple-cycle days observed across 5 years — insufficient sample to compute reliable HR"
    operating_days:
      value: 7
      status: real_observed
      source: "MOR notebook Stage 1 operating-mode classifier"
      caveat: "Lockport CAN bypass HRSG (per engineering.yaml.GEN1-3.can_bypass_hrsg), but rarely does. Present in MOR data; not enough sample to derive heat rate."

# ============================================================================
# Cross-validation: 2023 MOR-derived HR vs eGRID 2023 placeholder
# ============================================================================

cross_validation:
  egrid_2023_implied_hr_btu_per_kwh:
    value: 9228
    status: real_reported
    source: "EPA eGRID 2023 rev2: annual heat input / annual generation (plant grain)"
  mor_2023_all_cc_volume_weighted_btu_per_kwh:
    value: 9293
    status: real_observed
    source: "MOR notebook Stage 2.4: 2023-only volume-weighted across all CC modes"
  delta_pct:
    value: 0.7
    status: real_computed
    source: "(mor_2023 - egrid_2023) / egrid_2023 × 100"
    caveat: "Strong validation: proprietary 2023 reproduces public eGRID placeholder within <1%. Confirms parser + mode classifier + volume-weighting convention are correct."

# ============================================================================
# Cold-start gas — separately reported, NOT in operating heat rate
# ============================================================================
# 35 "idle_gas_baseline" days observed: gas burned (≥100 MMBtu) but neither
# electricity nor steam-to-host produced. Stage 1 §spot-check confirms these
# are warming days — gas burned to warm HRSGs and ST before generation.
# 97% of these days are followed by an active CC mode the next day.

cold_start_gas:
  warming_days_observed_5yr:
    value: 35
    status: real_observed
    source: "MOR notebook Stage 1 + Stage 2: idle_gas_baseline classification + warming-day spot-check"
  total_warming_gas_mmbtu_5yr:
    value: 88785
    status: real_observed
    source: "MOR notebook Stage 2.3 cold-start summary"
  mean_per_cold_start_mmbtu:
    value: 2537
    status: real_observed
    source: "MOR notebook Stage 2.3: 88,785 / 35"
  range_per_cold_start_mmbtu:
    min:
      value: 109
      status: real_observed
      source: "MOR notebook Stage 1 spot-check"
    max:
      value: 7203
      status: real_observed
      source: "MOR notebook Stage 1 spot-check"
  next_day_distribution:
    followed_by_3xCC_full:
      value: 19
      status: real_observed
      source: "MOR notebook Stage 1 spot-check"
    followed_by_2xCC:
      value: 12
      status: real_observed
      source: "MOR notebook Stage 1 spot-check"
    followed_by_1xCC:
      value: 3
      status: real_observed
      source: "MOR notebook Stage 1 spot-check"
    followed_by_thermal_only:
      value: 1
      status: real_observed
      source: "MOR notebook Stage 1 spot-check"
  pct_followed_by_active_cc_mode:
    value: 97.0
    status: real_computed
    source: "(19 + 12 + 3) / 35 × 100"

