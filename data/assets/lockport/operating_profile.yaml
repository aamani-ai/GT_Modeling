    confidence: MEDIUM

# ============================================================================
# DHTS (steam-to-host) — for cogen must-run constraint
# ============================================================================
# The plant delivers steam to an industrial host. When the host needs steam,
# the plant has a must-run constraint regardless of LMP. See caveats.md §6.

dhts:
  total_annual_mmbtu_typical:
    value: 80000
    status: real_observed
    source: "MOR notebook Stage 1 annual summary: ~80,000 MMBtu/yr DHTS delivery, except 2024 (~64,000 MMBtu)"
    caveat: "Stable host steam demand most years; 2024 dip flagged in Stage 1 finding 4. Worth tracking per-year."
  dip_year_2024_mmbtu:
    value: 64000
    status: real_observed
    source: "MOR notebook Stage 1 annual summary §4"
    caveat: "2024 was lower than typical — possibly host downtime or seasonal pattern. Doesn't change the must-run-during-delivery logic."

  must_run_constraint:
    value: "Plant must run minimum mode when DHTS daily MMBtu exceeds threshold"
    status: real_observed
    source: "MOR data shows 1,826 days with DHTS delivery pattern; thermal-only days demonstrate gas burn for host steam even when no electric output"
    caveat: "Encoded in src/cogen/host_steam_constraint.py at Phase I. Phase G Notebook 1 should extract day-level DHTS flag (above threshold) for use as a must-run input."

# ============================================================================
# Steam-only operating mode — duct-burner-driven steam delivery without MWh
# ============================================================================
# When dispatch is uneconomic but the cogen host needs steam, Lockport often
# operates in "steam-only" mode: gas burns through the HRSG duct burners
# (boiler_type "Db" per EIA-860; see engineering.yaml.generators.GEN4.boiler_type)
# delivering process steam without spinning the CTs or producing electricity.
#
# All values empirically derived from 5 years of MOR daily data (2021-2025).
# Source: notebooks/scratch/modeled_vs_mor_vs_eia923.py + data/paths/lockport/mor_daily.parquet
# Filter: days with net_output_mwh == 0 AND total_gas_mmbtu > 100 AND dhts_net_thermal_mmbtu > 100.

steam_only_mode:
  days_observed:
    value: 460
    status: real_observed
    source: "MOR daily 2021-2025: 460 days with 0 MWh + non-zero gas + non-zero DHTS"
  days_total:
    value: 1826
    status: real_observed
    source: "MOR daily coverage: 2021-01-01 to 2025-12-31"
  share_of_all_days_pct:
    value: 25.2
    status: real_observed
    source: "460 / 1826"
    caveat: "1 in 4 days at Lockport operates in steam-only mode. v1 N4 does not currently model this — see backtest_findings.md §3.4."
  gas_mmbtu_per_day_median:
    value: 871
    status: real_observed
    source: "Median of total_gas_mmbtu across 460 steam-only days"
    caveat: "Use median (not mean) for dispatch modeling — gas distribution is right-skewed with start-up / outlier days."
  gas_mmbtu_per_day_mean:
    value: 1270
    status: real_observed
    source: "Mean of total_gas_mmbtu across 460 steam-only days (std 2426)"
    caveat: "High std reflects warming/transition days mixed with steady steam-only days."
  dhts_mmbtu_per_day_median:
    value: 589
    status: real_observed
    source: "Median of dhts_net_thermal_mmbtu across 460 steam-only days"
  dhts_mmbtu_per_day_mean:
    value: 582
    status: real_observed
    source: "Mean of dhts_net_thermal_mmbtu across 460 steam-only days (std 105)"
    caveat: "Low std → DHTS delivery in steam-only mode is consistent ~600 MMBtu/day. The variance lives on the gas side, not the steam side."
  gas_to_steam_efficiency_overall:
    value: 0.458
    status: real_observed
    source: "Sum of DHTS / Sum of gas across 460 days = 267,792 / 584,160 = 0.458"
    caveat: "Ratio-of-totals (correct accounting). Mean-of-per-day-ratios is 0.643 but biased high due to start-up/transition days inflating per-day numerator. Use 0.458 for dispatch."
  mechanism:
    value: "HRSG duct burner — gas fired directly into HRSG, bypasses CTs"
    status: real_reported
    source: "EIA-860 6_2 Y2024 — boiler_type='Db' for boiler ID 4 linked to GEN4 (per engineering.yaml)"
    caveat: "v1 N4 must add a steam-only branch in must-run logic. Decision rule: when must_run AND uneconomic, compare cost(1×CC dispatch) vs cost(steam-only) and pick lower-cost. Steam-only uses ~871 MMBtu/day gas, no EOH accumulation, no CT operation."
  v1_modeling_treatment:
    value: "Add as a third option in must-run branch of N4 dispatch loop"
    status: placeholder
    source: "Phase J refactor — N4 §F.run_mode()"
    validation_path: "After implementation, modeled steam-only-day count should fall in 60-100 days/year range (vs MOR ~92/yr)"

