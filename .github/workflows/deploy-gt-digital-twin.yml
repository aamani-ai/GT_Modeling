name: Build and Deploy GT Digital Twin to Cloud Run

# Triggered by pushes to the dedicated deploy branch. The branch pattern keeps
# `main` non-deploying (every main push would be too aggressive while the
# dashboard is iterating). To deploy, merge / push to `deploy/gt-digital-twin`.
on:
  push:
    branches:
      - deploy/gt-digital-twin
  workflow_dispatch: {} # allow manual re-deploys without a new commit

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    env:
      # Image + Cloud Run service identifier — kept here so all steps reference
      # the same value. Change here if the service ever needs renaming.
      SERVICE: gt-digital-twin
      REGION: us-central1
      AR_HOST: us-central1-docker.pkg.dev
      AR_PROJECT: modeling-nonprod-svc-db5x
      AR_REPO: infrasuremodelingdocker
      # The Node app lives in a monorepo subdirectory; the buildpack runs against
      # this path, not the repo root.
      APP_PATH: apps/gt-digital-twin/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          project_id: 'modeling-nonprod-svc-db5x'
          workload_identity_provider: 'projects/952205173464/locations/global/workloadIdentityPools/infrasure-gh-actions-pool/providers/github-repo-provider'
          service_account: 'gh-actions-deploy@modeling-nonprod-svc-db5x.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v3'

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - name: Setup pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.0.0

      - name: Build and push image with Paketo Node buildpack
        # Node app, not Python — uses the Paketo Node buildpack. BP_NODE_RUN_SCRIPTS=build
        # tells the buildpack to run `npm run build` after install, which compiles the
        # Vite client into dist/public/ and the server into dist/index.cjs.
        # The launch image then runs `npm start` (server reads PORT from env, which
        # Cloud Run supplies).
        run: |
          IMAGE="${{ env.AR_HOST }}/${{ env.AR_PROJECT }}/${{ env.AR_REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          pack build "$IMAGE" \
            --builder paketobuildpacks/builder-jammy-base \
            --path ${{ env.APP_PATH }} \
            --env BP_NODE_RUN_SCRIPTS=build \
            --publish

      - name: Deploy to Cloud Run
        # IAP enabled + no public access — only aamani.ai domain users can reach it
        # (binding granted in the next step). No env-vars / secrets needed:
        # the app reads precomputed JSONs bundled into the image, no DB / API keys.
        run: |
          IMAGE="${{ env.AR_HOST }}/${{ env.AR_PROJECT }}/${{ env.AR_REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --platform managed \
            --region ${{ env.REGION }} \
            --iap \
            --no-allow-unauthenticated \
            --service-account project-service-account@modeling-nonprod-svc-db5x.iam.gserviceaccount.com

      - name: Grant IAP access to aamani.ai domain
        # Idempotent — running again is a no-op if the binding already exists.
        run: |
          gcloud iap web add-iam-policy-binding \
            --resource-type=cloud-run \
            --service=${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --member='domain:aamani.ai' \
            --role='roles/iap.httpsResourceAccessor' \
            --condition=None

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "=== Cloud Run service URL ==="
          echo "$URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
